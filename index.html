<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2c3e50">
    <title>تطبيق الوقود - م. محمد سهران</title>

    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --accent: #3498db; --dark: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { background: #fff; width: 100%; max-width: 450px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        .header { background: var(--dark); color: white; padding: 15px 5px; text-align: center; border-bottom: 2px solid var(--accent); }
        .header h1 { font-size: 1.1rem; }
        .current-date { color: var(--accent); font-weight: bold; font-size: 0.85rem; margin-top: 5px; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 20px 10px; }
        
        /* الدائرة الملونة وبداخلها الإيموجي */
        .status-ring { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 8px solid #eee; position: relative; transition: 0.3s; }
        .status-ring.active { border-color: var(--primary); box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
        .status-ring.locked { border-color: #bdc3c7; }
        
        .fuel-emoji-inside { font-size: 4.5rem; line-height: 1; }
        
        .day-badge { position: absolute; top: -15px; background: var(--accent); color: white; padding: 4px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .remain-label { font-size: 1.2rem; font-weight: bold; color: var(--dark); text-align: center; }

        .btn-fuel { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 35px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 85%; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        .btn-fuel:disabled { background: #bdc3c7; opacity: 0.7; box-shadow: none; }
        
        .history-panel { background: #fcfcfc; border-top: 1px solid #eee; padding: 10px 20px; height: 130px; }
        .log-container { height: 85px; overflow-y: auto; font-size: 0.75rem; }
        .log-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f1f1f1; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>مواعيد تزويد الوقود - كركوك ⛽</h1>
        <div id="date-display" class="current-date"></div>
    </div>

    <div class="main-content">
        <div class="status-ring" id="ring">
            <span class="day-badge" id="day-txt">..</span>
            <span class="fuel-emoji-inside">⛽</span>
        </div>
        <div class="remain-label" id="remain-txt">جاري الحساب...</div>
        <button class="btn-fuel" id="fuel-btn" onclick="saveAction()">تأكيد التعبئة الآن ✅</button>
        <button style="background:none; border:none; color:var(--danger); margin-top:10px; cursor:pointer;" onclick="resetLog()">مسح السجل 🗑️</button>
    </div>

    <div class="history-panel">
        <strong>آخر العمليات:</strong>
        <div class="log-container" id="log-list"></div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    const START = new Date(2026, 2, 31); 
    const CYCLE = 5;

    function update() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        document.getElementById('date-display').innerText = now.toLocaleDateString('ar-IQ', { weekday: 'long', day: 'numeric', month: 'long' });

        const diff = Math.floor((today - START) / 86400000);
        const dayInCycle = ((diff % CYCLE) + CYCLE) % CYCLE + 1;
        
        document.getElementById('day-txt').innerText = `اليوم ${dayInCycle} من ${CYCLE}`;
        
        const logs = JSON.parse(localStorage.getItem('Fuel_Log') || "[]");
        const currentCycleId = diff - (dayInCycle - 1);
        const done = logs.some(l => l.cid === currentCycleId);

        const btn = document.getElementById('fuel-btn');
        const ring = document.getElementById('ring');
        const txt = document.getElementById('remain-txt');

        if (done) {
            ring.className = "status-ring locked";
            btn.disabled = true;
            btn.innerText = "تم التسجيل";
            txt.innerText = "عملية مكتملة";
        } else {
            ring.className = "status-ring active";
            btn.disabled = false;
            btn.innerText = "تأكيد التعبئة الآن ✅";
            txt.innerText = "التعبئة متاحة حالياً";
        }
        render();
    }

    function saveAction() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diff = Math.floor((today - START) / 86400000);
        const dayInCycle = ((diff % CYCLE) + CYCLE) % CYCLE + 1;

        let logs = JSON.parse(localStorage.getItem('Fuel_Log') || "[]");
        logs.unshift({
            d: now.toLocaleDateString('ar-IQ'),
            t: now.toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'}),
            cid: diff - (dayInCycle - 1)
        });
        localStorage.setItem('Fuel_Log', JSON.stringify(logs.slice(0, 5)));
        update();
    }

    function render() {
        const logs = JSON.parse(localStorage.getItem('Fuel_Log') || "[]");
        document.getElementById('log-list').innerHTML = logs.map(l => 
            `<div class="log-row"><span>⛽ تعبئة</span><span>${l.d} | ${l.t}</span></div>`).join('');
    }

    function resetLog() { if(confirm("مسح السجل؟")) { localStorage.removeItem('Fuel_Log'); update(); } }

    window.onload = update;
</script>
</body>
</html>
