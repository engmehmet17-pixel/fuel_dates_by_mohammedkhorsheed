<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2c3e50">
    <title>تطبيق الوقود - كركوك ⛽</title>

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/26fd/512.png">

    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --accent: #3498db; --dark: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { background: #fff; width: 100%; max-width: 450px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        #manual-install-banner { display: none; background: var(--accent); color: white; padding: 12px; text-align: center; flex-direction: column; align-items: center; gap: 8px; border-bottom: 2px solid rgba(0,0,0,0.1); }
        #install-button { background: white; color: var(--accent); border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        .header { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--accent); }
        .header h1 { font-size: 1.1rem; }
        .dev-info { font-size: 0.65rem; opacity: 0.7; margin-top: 3px; }
        #date-display { color: var(--accent); font-weight: bold; font-size: 0.85rem; margin-top: 5px; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 20px; }
        .status-ring { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 8px solid #eee; position: relative; transition: 0.4s; }
        .status-ring.active { border-color: var(--primary); box-shadow: 0 0 25px rgba(46, 204, 113, 0.3); }
        .status-ring.locked { border-color: #bdc3c7; }
        .fuel-emoji { font-size: 4.5rem; }
        
        .day-badge { position: absolute; top: -15px; background: var(--accent); color: white; padding: 4px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .remain-label { font-size: 1.2rem; font-weight: bold; color: var(--dark); text-align: center; }
        .next-date-label { font-size: 0.85rem; color: #555; background: #f0f7ff; padding: 8px 12px; border-radius: 10px; border: 1px dashed var(--accent); margin-top: 5px; }

        .btn-fuel { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 40px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 85%; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); transition: 0.2s; }
        .btn-fuel:disabled { background: #bdc3c7; opacity: 0.7; }
        .btn-fuel:active { transform: scale(0.96); }

        .history-panel { background: #f9f9f9; border-top: 1px solid #eee; padding: 12px; height: 140px; overflow: hidden; }
        .log-container { height: 90px; overflow-y: auto; font-size: 0.75rem; margin-top: 5px; }
        .log-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="manual-install-banner">
        <span>ثبّت التطبيق لحماية سجل التعبئة ⛽</span>
        <button id="install-button">تثبيت الآن</button>
    </div>

    <div class="header">
        <h1>مواعيد تزويد الوقود - كركوك</h1>
        <div class="dev-info">فكرة وتصميم م.محمد سهران خورشيد جميع الحقوق محفوظة © 2026</div>
        <div id="date-display"></div>
    </div>

    <div class="main-content">
        <div class="status-ring" id="ring">
            <span class="day-badge" id="day-txt">..</span>
            <span class="fuel-emoji">⛽</span>
        </div>
        <div class="remain-label" id="remain-txt">جاري المزامنة...</div>
        <div id="next-fuel-date" class="next-date-label">موعد التفعيل القادم: --</div>
        
        <button class="btn-fuel" id="fuel-btn" onclick="saveAction()">تأكيد التعبئة الآن ✅</button>
        <button style="background:none; border:none; color:var(--danger); font-size:0.8rem; cursor:pointer; margin-top:5px;" onclick="resetLog()">مسح السجل 🗑️</button>
    </div>

    <div class="history-panel">
        <strong>آخر العمليات المسجلة:</strong>
        <div id="log-list" class="log-container"></div>
    </div>
</div>

<script>
    let db;
    let deferredPrompt;
    const START_DATE = new Date(2026, 2, 31); 
    const CYCLE_DAYS = 5;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('manual-install-banner').style.display = 'flex';
    });

    document.getElementById('install-button').addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('manual-install-banner').style.display = 'none';
            deferredPrompt = null;
        }
    });

    async function requestPersistence() {
        if (navigator.storage && navigator.storage.persist) await navigator.storage.persist();
    }

    const request = indexedDB.open("FuelUltimateDB", 9);
    request.onupgradeneeded = e => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("logs")) db.createObjectStore("logs", { keyPath: "id" });
    };

    request.onsuccess = e => {
        db = e.target.result;
        requestPersistence();
        updateUI();
    };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => reg.update());
        });
    }

    function updateUI() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        document.getElementById('date-display').innerText = now.toLocaleDateString('ar-IQ', { weekday: 'long', day: 'numeric', month: 'long' });

        const totalDiff = Math.floor((today - START_DATE) / 86400000);
        const dayInCycle = ((totalDiff % CYCLE_DAYS) + CYCLE_DAYS) % CYCLE_DAYS + 1;
        
        // حساب بداية الدورة الحالية
        const currentCycleStart = new Date(today);
        currentCycleStart.setDate(today.getDate() - (dayInCycle - 1));
        
        // حساب "بداية الدورة القادمة" (بإضافة 5 أيام للدورة الحالية)
        const nextCycleDate = new Date(currentCycleStart);
        nextCycleDate.setDate(currentCycleStart.getDate() + CYCLE_DAYS);
        
        // تنسيق التاريخ (يوم-شهر-سنة)
        const d = String(nextCycleDate.getDate()).padStart(2, '0');
        const m = String(nextCycleDate.getMonth() + 1).padStart(2, '0');
        const y = nextCycleDate.getFullYear();
        const formattedNextDate = `${d}-${m}-${y}`;

        if (!db) return;
        const transaction = db.transaction("logs", "readonly");
        const store = transaction.objectStore("logs");
        const getAll = store.getAll();

        getAll.onsuccess = () => {
            const logs = getAll.result.sort((a, b) => b.id - a.id);
            const cycleId = totalDiff - (dayInCycle - 1);
            const isDone = logs.some(l => l.cid === cycleId);

            const btn = document.getElementById('fuel-btn');
            const ring = document.getElementById('ring');
            const txt = document.getElementById('remain-txt');
            const nextFuelLabel = document.getElementById('next-fuel-date');

            if (isDone) {
                ring.className = "status-ring locked";
                btn.disabled = true;
                btn.innerText = "تم تسجيل التعبئة";
                txt.innerText = "عملية مكتملة لهذه الدورة";
            } else {
                ring.className = "status-ring active";
                btn.disabled = false;
                btn.innerText = "تأكيد التعبئة الآن ✅";
                txt.innerText = "التعبئة متاحة حالياً";
            }

            // الخانة الآن تعرض الموعد القادم (10-04-2026 في مثالك)
            nextFuelLabel.innerText = `موعد التفعيل القادم: ${formattedNextDate}`;
            
            document.getElementById('day-txt').innerText = `اليوم ${dayInCycle} من ${CYCLE_DAYS}`;
            renderLogs(logs);
        };
    }

    function saveAction() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diff = Math.floor((today - START_DATE) / 86400000);
        const dayInCycle = ((diff % CYCLE_DAYS) + CYCLE_DAYS) % CYCLE_DAYS + 1;

        const entry = {
            id: Date.now(),
            d: now.toLocaleDateString('ar-IQ'),
            t: now.toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'}),
            cid: diff - (dayInCycle - 1)
        };

        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").add(entry);
        tx.oncomplete = () => updateUI();
    }

    function renderLogs(logs) {
        document.getElementById('log-list').innerHTML = logs.slice(0, 5).map(l => 
            `<div class="log-row"><span>⛽ تم التزويد</span><span>${l.d} | ${l.t}</span></div>`).join('');
    }

    function resetLog() {
        if(confirm("تحذير: سيتم مسح سجل التعبئة بالكامل. هل أنت متأكد؟")) {
            const tx = db.transaction("logs", "readwrite");
            tx.objectStore("logs").clear();
            tx.oncomplete = () => updateUI();
        }
    }
</script>
</body>
</html>
