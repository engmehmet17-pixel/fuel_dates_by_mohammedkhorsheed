<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2c3e50">
    <title>تطبيق الوقود - م. محمد سهران</title>
    
        <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مواعيد الوقود">
    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --accent: #3498db; --dark: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { background: #fff; width: 100%; max-width: 400px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        
        .header { background: var(--dark); color: white; padding: 8px 5px; text-align: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .header h1 { font-size: 0.9rem; }
        .header .dev-info { font-size: 0.6rem; opacity: 0.8; }
        .header .current-date { color: var(--accent); font-weight: bold; font-size: 0.75rem; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px 5px; overflow: hidden; }
        
        .status-ring { width: 110px; height: 110px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 6px solid #eee; position: relative; }
        .status-ring.active { border-color: var(--primary); }
        .status-ring.locked { border-color: #bdc3c7; }
        .fuel-icon { font-size: 3rem; }
        
        .day-badge { position: absolute; top: -12px; background: var(--accent); color: white; padding: 2px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; }
        .remain-label { font-size: 0.95rem; font-weight: bold; color: var(--accent); }
        .next-call { font-size: 0.75rem; color: #555; background: #f8f9fa; padding: 4px 12px; border-radius: 5px; border: 1px solid #eee; }

        .btn-fuel { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 25px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 80%; transition: 0.2s; box-shadow: 0 3px 8px rgba(46, 204, 113, 0.3); }
        .btn-fuel:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; }
        
        .btn-clear { background: none; border: none; color: var(--danger); font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .history-panel { background: #fcfcfc; border-top: 1px solid #eee; padding: 5px 15px; height: 100px; flex-shrink: 0; }
        .history-title { font-size: 0.7rem; font-weight: bold; color: var(--dark); border-right: 3px solid var(--accent); padding-right: 8px; margin-bottom: 3px; }
        .log-container { height: 75px; overflow-y: auto; font-size: 0.65rem; }
        .log-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>مواعيد تزويد الوقود - كركوك ⛽</h1>
        <div class="dev-info">فكرة وتصميم: م. محمد سهران خورشيد | 2026 ©</div>
        <div id="date-display" class="current-date"></div>
    </div>

    <div class="main-content">
        <div class="status-ring" id="ring">
            <span class="day-badge" id="day-txt">..</span>
            <span class="fuel-icon">⛽</span>
        </div>
        <div class="remain-label" id="remain-txt">جاري الحساب...</div>
        <div class="next-call" id="next-date">موعد التفعيل القادم: ...</div>
        <button class="btn-fuel" id="fuel-btn" onclick="saveAction()">تم التعبئة ✅</button>
        <button class="btn-clear" onclick="resetLog()"><span>مسح سجل العمليات</span> 🗑️</button>
    </div>

    <div class="history-panel">
        <div class="history-title">سجل التعبئة:</div>
        <div class="log-container" id="log-list"></div>
    </div>
</div>

<script>
    // تسجيل عامل الخدمة لضمان التحديث التلقائي والعمل بدون إنترنت
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdpbnN0YWxsJywgZSA9PiBzZWxmLnNraXBXYWl0aW5nKCkpOwpzZWxmLmFkZEV2ZW50TGlzdGVuZXIoJ2FjdGl2YXRlJywgZSA9PiBlLndhaXRVbnRpbChjbGllbnRzLmNsYWltKCkpKTsKc2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGUgPT4gZS5yZXNwb25kV2l0aChmZXRjaChlLnJlcXVlc3QpKSk7');
    }

    const START = new Date(2026, 2, 31); 
    const CYCLE = 5;

    function update() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        document.getElementById('date-display').innerText = now.toLocaleDateString('ar-IQ', { weekday: 'long', day: 'numeric', month: 'long' });

        const diff = Math.floor((today - START) / 86400000);
        const dayInCycle = ((diff % CYCLE) + CYCLE) % CYCLE + 1;
        const daysWait = (dayInCycle === 1) ? 0 : (CYCLE - dayInCycle + 1);

        document.getElementById('day-txt').innerText = `اليوم ${dayInCycle} من ${CYCLE}`;
        
        const logs = JSON.parse(localStorage.getItem('Fuel_V5_Final') || "[]");
        const currentCycleStart = diff - (dayInCycle - 1);
        const done = logs.some(l => l.cid === currentCycleStart);

        const btn = document.getElementById('fuel-btn');
        const ring = document.getElementById('ring');
        const txt = document.getElementById('remain-txt');

        if (done) {
            ring.className = "status-ring locked";
            btn.disabled = true;
            btn.innerText = "تم تسجيل التعبئة";
            txt.innerText = "عملية مكتملة";
        } else {
            ring.className = "status-ring active";
            btn.disabled = false;
            btn.innerText = "تم التعبئة ✅";
            txt.innerText = "التعبئة متاحة الآن";
        }

        const nxt = new Date(today); 
        nxt.setDate(today.getDate() + daysWait);
        document.getElementById('next-date').innerText = `موعد التفعيل القادم: ${nxt.toLocaleDateString('ar-IQ', {day:'numeric', month:'long'})}`;

        render();
    }

    function saveAction() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diff = Math.floor((today - START) / 86400000);
        const dayInCycle = ((diff % CYCLE) + CYCLE) % CYCLE + 1;

        let logs = JSON.parse(localStorage.getItem('Fuel_V5_Final') || "[]");
        logs.unshift({
            d: now.toLocaleDateString('ar-IQ'),
            t: now.toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'}),
            cid: diff - (dayInCycle - 1)
        });
        localStorage.setItem('Fuel_V5_Final', JSON.stringify(logs.slice(0, 10)));
        update();
    }

    function render() {
        const logs = JSON.parse(localStorage.getItem('Fuel_V5_Final') || "[]");
        document.getElementById('log-list').innerHTML = logs.length ? 
            logs.map(l => `<div class="log-row"><span>تعبئة وقود</span><span>${l.d} | ${l.t}</span></div>`).join('') : 
            '<div style="text-align:center;padding-top:10px;color:#ccc">لا توجد سجلات</div>';
    }

    function resetLog() {
        if(confirm("سيتم مسح السجل وتفعيل الزر مجدداً. استمرار؟")) {
            localStorage.removeItem('Fuel_V5_Final');
            update();
        }
    }

    window.onload = update;
</script>
</body>
</html>
