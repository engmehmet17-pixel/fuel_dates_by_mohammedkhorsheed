<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2c3e50">
    <title>تطبيق الوقود - كركوك ⛽</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/26fd/512.png">

    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --accent: #3498db; --dark: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { background: #fff; width: 100%; max-width: 450px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        .header { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--accent); }
        .header h1 { font-size: 1.1rem; }
        .dev-info { font-size: 0.65rem; opacity: 0.7; margin-top: 3px; }
        #date-display { color: var(--accent); font-weight: bold; font-size: 0.85rem; margin-top: 5px; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 20px; }
        .status-ring { width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 8px solid #eee; position: relative; transition: 0.4s; }
        .status-ring.active { border-color: var(--primary); box-shadow: 0 0 25px rgba(46, 204, 113, 0.3); }
        .status-ring.locked { border-color: #bdc3c7; }
        .fuel-emoji { font-size: 5rem; }
        
        .day-badge { position: absolute; top: -15px; background: var(--accent); color: white; padding: 4px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .remain-label { font-size: 1.3rem; font-weight: bold; color: var(--dark); text-align: center; }
        .next-date-label { font-size: 0.9rem; color: #555; background: #f0f7ff; padding: 8px 15px; border-radius: 10px; border: 1px dashed var(--accent); margin-top: 5px; }

        .btn-fuel { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 85%; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); transition: 0.2s; }
        .btn-fuel:disabled { background: #bdc3c7; opacity: 0.7; }

        .history-panel { background: #f9f9f9; border-top: 1px solid #eee; padding: 15px; height: 140px; overflow: hidden; }
        .log-container { height: 90px; overflow-y: auto; font-size: 0.8rem; margin-top: 5px; }
        .log-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>مواعيد تزويد الوقود - كركوك ⛽</h1>
        <div class="dev-info">فكرة وتصميم: م.محمد سهران خورشيد © 2026</div>
        <div id="date-display"></div>
    </div>

    <div class="main-content">
        <div class="status-ring" id="ring">
            <span class="day-badge" id="day-txt">..</span>
            <span class="fuel-emoji">⛽</span>
        </div>
        <div class="remain-label" id="remain-txt">جاري الحساب...</div>
        <div id="next-fuel-date" class="next-date-label">موعدك القادم: --</div>
        
        <button class="btn-fuel" id="fuel-btn" onclick="saveAction()">تأكيد التعبئة الآن ✅</button>
        <button style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer; margin-top:5px;" onclick="resetLog()">مسح السجل 🗑️</button>
    </div>

    <div class="history-panel">
        <strong>آخر العمليات المسجلة:</strong>
        <div id="log-list" class="log-container"></div>
    </div>
</div>

<script>
    let db;
    const START_DATE = new Date(2026, 2, 31); 
    const CYCLE_DAYS = 5;

    // 1. طلب التخزين الدائم فور فتح التطبيق
    async function requestPersistence() {
        if (navigator.storage && navigator.storage.persist) {
            const isPersisted = await navigator.storage.persist();
            console.log(`حالة حماية البيانات: ${isPersisted ? "دائمة" : "مؤقتة"}`);
        }
    }

    // 2. تهيئة قاعدة البيانات العميقة
    const request = indexedDB.open("FuelPersistentDB", 4);
    request.onupgradeneeded = e => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("logs")) {
            db.createObjectStore("logs", { keyPath: "id" });
        }
    };
    request.onsuccess = e => {
        db = e.target.result;
        requestPersistence();
        updateUI();
    };

    function updateUI() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        document.getElementById('date-display').innerText = now.toLocaleDateString('ar-IQ', { weekday: 'long', day: 'numeric', month: 'long' });

        const diff = Math.floor((today - START_DATE) / 86400000);
        const dayInCycle = ((diff % CYCLE_DAYS) + CYCLE_DAYS) % CYCLE_DAYS + 1;
        let daysToWait = (dayInCycle === 1) ? 0 : (CYCLE_DAYS - dayInCycle + 1);
        const nextDate = new Date(today);
        nextDate.setDate(today.getDate() + daysToWait);
        
        document.getElementById('next-fuel-date').innerText = `موعدك الرسمي القادم: ${nextDate.toLocaleDateString('ar-IQ', {day:'numeric', month:'long'})}`;
        document.getElementById('day-txt').innerText = `اليوم ${dayInCycle} من ${CYCLE_DAYS}`;

        if (!db) return;
        const transaction = db.transaction("logs", "readonly");
        const store = transaction.objectStore("logs");
        const getAll = store.getAll();

        getAll.onsuccess = () => {
            const logs = getAll.result.sort((a, b) => b.id - a.id);
            const cycleId = diff - (dayInCycle - 1);
            const isDone = logs.some(l => l.cid === cycleId);

            const btn = document.getElementById('fuel-btn');
            const ring = document.getElementById('ring');
            const txt = document.getElementById('remain-txt');

            if (isDone) {
                ring.className = "status-ring locked";
                btn.disabled = true;
                btn.innerText = "تم تسجيل التعبئة";
                txt.innerText = "عملية مكتملة لهذه الدورة";
            } else {
                ring.className = "status-ring active";
                btn.disabled = false;
                btn.innerText = "تأكيد التعبئة الآن ✅";
                txt.innerText = "التعبئة متاحة حالياً";
            }
            renderLogs(logs);
        };
    }

    function saveAction() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diff = Math.floor((today - START_DATE) / 86400000);
        const dayInCycle = ((diff % CYCLE_DAYS) + CYCLE_DAYS) % CYCLE_DAYS + 1;

        const entry = {
            id: Date.now(),
            d: now.toLocaleDateString('ar-IQ'),
            t: now.toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'}),
            cid: diff - (dayInCycle - 1)
        };

        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").add(entry);
        tx.oncomplete = () => updateUI();
    }

    function renderLogs(logs) {
        document.getElementById('log-list').innerHTML = logs.slice(0, 5).map(l => 
            `<div class="log-row"><span>⛽ تم التزويد</span><span>${l.d} | ${l.t}</span></div>`).join('');
    }

    function resetLog() {
        if(confirm("هل تريد مسح السجل نهائياً؟")) {
            const tx = db.transaction("logs", "readwrite");
            tx.objectStore("logs").clear();
            tx.oncomplete = () => updateUI();
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
