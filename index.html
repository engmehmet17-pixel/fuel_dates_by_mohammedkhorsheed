<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطبيق الوقود - كركوك</title>
    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --accent: #3498db; --dark: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .app-container { background: #fff; width: 100%; max-width: 400px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }

        /* شريط العنوان - بدون تغيير */
        .header { background: var(--dark); color: white; padding: 10px 5px; text-align: center; border-bottom: 3px solid var(--accent); flex-shrink: 0; }
        .header h1 { font-size: 0.95rem; margin-bottom: 2px; }
        .header .dev-info { font-size: 0.65rem; opacity: 0.8; }
        .header .current-date { color: var(--accent); font-weight: bold; font-size: 0.8rem; margin-top: 3px; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 5px 10px; }

        /* الدائرة التفاعلية حول الأيقونة */
        .status-ring {
            width: 130px; height: 130px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 6px solid #eee; position: relative; transition: 0.4s;
        }
        .status-ring.active { border-color: var(--primary); }
        .status-ring.locked { border-color: var(--danger); }
        .icon-fuel { width: 70px; }
        .day-label { position: absolute; top: -10px; background: var(--accent); color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.65rem; font-weight: bold; }

        .remaining-txt { font-size: 0.8rem; font-weight: bold; color: var(--accent); }

        .timer-card { background: #f9f9f9; width: 90%; padding: 5px; border-radius: 10px; border: 1px solid #eee; text-align: center; }
        .timer-card small { font-size: 0.55rem; color: #7f8c8d; }
        .timer-val { font-family: monospace; font-size: 1rem; font-weight: bold; color: var(--dark); }

        .next-info { font-size: 0.7rem; color: #555; }

        /* الزر المختصر */
        .btn-fuel {
            background: var(--primary); color: white; border: none;
            padding: 6px 25px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;
            cursor: pointer; width: 60%; box-shadow: 0 3px 6px rgba(46, 204, 113, 0.2);
        }
        .btn-fuel:disabled { background: #bdc3c7; box-shadow: none; }
        .btn-clear { color: var(--danger); font-size: 0.6rem; background: none; border: none; margin-top: 2px; cursor: pointer; }

        /* سجل العمليات المصغر */
        .history-box { background: #fcfcfc; border-top: 1px solid #eee; padding: 5px 15px; height: 80px; flex-shrink: 0; }
        .history-header { font-size: 0.65rem; font-weight: bold; color: var(--dark); border-right: 3px solid var(--accent); padding-right: 5px; margin-bottom: 3px; }
        .log-list { height: 50px; overflow-y: auto; font-size: 0.55rem; color: #666; }
        .log-item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>مواعيد تزويد الوقود - كركوك ⛽</h1>
        <div class="dev-info">فكرة وتصميم: م. محمد سهران خورشيد | حقوق النشر © 2026</div>
        <div id="date-display" class="current-date"></div>
    </div>

    <div class="main-content">
        <div class="status-ring" id="ring">
            <span class="day-label" id="day-badge">اليوم .. من ..</span>
            <img src="https://cdn-icons-png.flaticon.com/512/3414/3414541.png" class="icon-fuel" alt="fuel">
        </div>

        <div class="remaining-txt" id="remain-txt">متبقي .. أيام</div>

        <div class="timer-card">
            <small>متبقي على الموعد القادم:</small>
            <div class="timer-val" id="timer-val">00:00:00</div>
        </div>

        <div class="next-info" id="next-date">التفعيل القادم: ...</div>

        <button class="btn-fuel" id="fuel-btn" onclick="logAction()">تم التعبئة ✅</button>
        <button class="btn-clear" onclick="clearLogs()">🗑️ مسح السجل</button>
    </div>

    <div class="history-box">
        <div class="history-header">آخر العمليات المسجلة:</div>
        <div class="log-list" id="log-list"></div>
    </div>
</div>

<script>
    const START = new Date(2026, 2, 31); 
    const CYCLE = 5;

    function refresh() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        document.getElementById('date-display').innerText = now.toLocaleDateString('ar-IQ', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const diff = Math.floor((today - START) / 86400000);
        let currentDay = ((diff % CYCLE) + CYCLE) % CYCLE + 1;
        let wait = (currentDay === 1) ? 0 : (CYCLE - currentDay + 1);

        document.getElementById('day-badge').innerText = `اليوم ${currentDay} من ${CYCLE}`;
        document.getElementById('remain-txt').innerText = `متبقي ${wait} أيام`;

        const logs = JSON.parse(localStorage.getItem('fuel_v3') || "[]");
        const doneToday = logs.some(l => l.includes(today.toLocaleDateString('ar-IQ')));
        
        const ring = document.getElementById('ring');
        const btn = document.getElementById('fuel-btn');

        // منطق تلوين الدائرة التفاعلية
        if (currentDay === 1) {
            if (doneToday) {
                ring.className = "status-ring locked";
                btn.disabled = true;
            } else {
                ring.className = "status-ring active";
                btn.disabled = false;
            }
            const end = new Date(today); end.setHours(23,59,59); updateTimer(end);
        } else {
            ring.className = "status-ring";
            btn.disabled = true;
            const next = new Date(today); next.setDate(today.getDate() + wait); updateTimer(next);
        }

        const nextD = new Date(today); nextD.setDate(today.getDate() + wait);
        document.getElementById('next-date').innerText = `التفعيل القادم: ${nextD.toLocaleDateString('ar-IQ', {day:'numeric', month:'long'})}`;
        renderLogs();
    }

    function updateTimer(target) {
        const dist = target - new Date();
        if (dist < 0) { document.getElementById("timer-val").innerText = "00:00:00"; return; }
        const d = Math.floor(dist / 86400000);
        const h = Math.floor((dist % 86400000) / 3600000);
        const m = Math.floor((dist % 3600000) / 60000);
        const s = Math.floor((dist % 60000) / 1000);
        document.getElementById("timer-val").innerText = (d > 0 ? d + " يوم و " : "") + 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function logAction() {
        let logs = JSON.parse(localStorage.getItem('fuel_v3') || "[]");
        logs.unshift(new Date().toLocaleDateString('ar-IQ') + " | " + new Date().toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'}));
        localStorage.setItem('fuel_v3', JSON.stringify(logs.slice(0, 5)));
        refresh();
    }

    function renderLogs() {
        const logs = JSON.parse(localStorage.getItem('fuel_v3') || "[]");
        document.getElementById('log-list').innerHTML = logs.length ? 
            logs.map(l => `<div class="log-item"><span>تعبئة وقود</span><span>${l}</span></div>`).join('') : 
            '<div style="text-align:center; padding-top:10px;">لا توجد سجلات</div>';
    }

    function clearLogs() { if(confirm("مسح؟")) { localStorage.removeItem('fuel_v3'); refresh(); } }

    setInterval(refresh, 1000);
    window.onload = refresh;
</script>
</body>
</html>
