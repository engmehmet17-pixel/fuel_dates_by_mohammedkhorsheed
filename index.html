<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مواعيد الوقود - كركوك</title>
    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --accent: #3498db; --dark: #2c3e50; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .app-container { background: #fff; width: 100%; max-width: 400px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }

        .header { background: var(--dark); color: white; padding: 8px 5px; text-align: center; border-bottom: 3px solid var(--accent); flex-shrink: 0; }
        .header h1 { font-size: 0.9rem; }
        .header .dev-info { font-size: 0.6rem; opacity: 0.8; }
        .header .current-date { color: var(--accent); font-weight: bold; font-size: 0.75rem; margin-top: 2px; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 5px; }

        .status-ring {
            width: 110px; height: 110px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 5px solid #eee; position: relative; transition: 0.3s;
        }
        .status-ring.active { border-color: var(--primary); }
        .status-ring.locked { border-color: var(--danger); }
        .fuel-emoji { font-size: 3rem; }
        
        .day-label { position: absolute; top: -12px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; font-weight: bold; }

        .remain-txt { font-size: 0.8rem; font-weight: bold; color: var(--accent); }

        /* العداد بدون سطر العنوان العلوي المزعج */
        .timer-box { background: #f9f9f9; width: 85%; padding: 8px; border-radius: 10px; border: 1px solid #eee; text-align: center; }
        .timer-val { font-family: monospace; font-size: 1.1rem; font-weight: bold; color: var(--dark); }

        .next-info { font-size: 0.7rem; color: #555; font-weight: 500; }

        .btn-fuel {
            background: var(--primary); color: white; border: none;
            padding: 8px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: bold;
            cursor: pointer; width: 65%; box-shadow: 0 3px 6px rgba(46, 204, 113, 0.2);
        }
        .btn-fuel:disabled { background: #bdc3c7; box-shadow: none; }
        
        .btn-clear-box { display: flex; align-items: center; gap: 5px; color: var(--danger); font-size: 0.65rem; cursor: pointer; background: none; border: none; margin-top: 2px; }

        .history-section { background: #fafafa; border-top: 1px solid #eee; padding: 5px 15px; height: 90px; flex-shrink: 0; }
        .history-header { font-size: 0.65rem; font-weight: bold; margin-bottom: 2px; color: var(--dark); border-right: 3px solid var(--accent); padding-right: 5px; }
        .log-list { height: 65px; overflow-y: auto; font-size: 0.55rem; color: #666; }
        .log-item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>مواعيد تزويد الوقود - كركوك</h1>
        <div class="dev-info">فكرة وتصميم: م. محمد سهران خورشيد © 2026</div>
        <div id="date-display" class="current-date"></div>
    </div>

    <div class="main-content">
        <div class="status-ring" id="ring">
            <span class="day-label" id="day-badge">اليوم .. من ..</span>
            <span class="fuel-emoji">⛽</span>
        </div>

        <div class="remain-txt" id="remain-txt">متبقي .. أيام</div>

        <div class="timer-box">
            <div class="timer-val" id="timer-val">00:00:00</div>
        </div>

        <div class="next-info" id="next-date">التفعيل القادم: ...</div>

        <button class="btn-fuel" id="fuel-btn" onclick="save()">تم التعبئة ✅</button>
        
        <button class="btn-clear-box" onclick="clearAll()">
            <span>مسح السجل</span> 🗑️
        </button>
    </div>

    <div class="history-section">
        <div class="history-header">سجل التعبئة:</div>
        <div class="log-list" id="log-list"></div>
    </div>
</div>

<script>
    const START = new Date(2026, 2, 31); 
    const CYCLE = 5;

    function logic() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        document.getElementById('date-display').innerText = now.toLocaleDateString('ar-IQ', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const diff = Math.floor((today - START) / 86400000);
        let dayNum = ((diff % CYCLE) + CYCLE) % CYCLE + 1;
        let wait = (dayNum === 1) ? 0 : (CYCLE - dayNum + 1);

        document.getElementById('day-badge').innerText = `اليوم ${dayNum} من ${CYCLE}`;
        document.getElementById('remain-txt').innerText = `متبقي ${wait} أيام`;

        const logs = JSON.parse(localStorage.getItem('fuel_final_v1') || "[]");
        const done = logs.some(l => l.includes(today.toLocaleDateString('ar-IQ')));
        
        const ring = document.getElementById('ring');
        const btn = document.getElementById('fuel-btn');

        if (dayNum === 1) {
            if (done) {
                ring.className = "status-ring locked";
                btn.disabled = true;
                btn.innerText = "تم التعبئة اليوم";
            } else {
                ring.className = "status-ring active";
                btn.disabled = false;
                btn.innerText = "تم التعبئة ✅";
            }
            const end = new Date(today); end.setHours(23,59,59); run(end);
        } else {
            ring.className = "status-ring";
            btn.disabled = true;
            btn.innerText = "التعبئة غير متاحة";
            const next = new Date(today); next.setDate(today.getDate() + wait); run(next);
        }

        const nextD = new Date(today); nextD.setDate(today.getDate() + wait);
        document.getElementById('next-date').innerText = `التفعيل القادم: ${nextD.toLocaleDateString('ar-IQ', {day:'numeric', month:'long'})}`;
        show();
    }

    function run(target) {
        const dist = target - new Date();
        if (dist < 0) { document.getElementById("timer-val").innerText = "00:00:00"; return; }
        const d = Math.floor(dist / 86400000);
        const h = Math.floor((dist % 86400000) / 3600000);
        const m = Math.floor((dist % 3600000) / 60000);
        const s = Math.floor((dist % 60000) / 1000);
        document.getElementById("timer-val").innerText = (d > 0 ? d + " يوم و " : "") + 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function save() {
        let logs = JSON.parse(localStorage.getItem('fuel_final_v1') || "[]");
        logs.unshift(new Date().toLocaleDateString('ar-IQ') + " | " + new Date().toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'}));
        localStorage.setItem('fuel_final_v1', JSON.stringify(logs.slice(0, 10)));
        logic();
    }

    function show() {
        const logs = JSON.parse(localStorage.getItem('fuel_final_v1') || "[]");
        document.getElementById('log-list').innerHTML = logs.length ? 
            logs.map(l => `<div class="log-item"><span>تعبئة</span><span>${l}</span></div>`).join('') : "لا يوجد سجلات";
    }

    function clearAll() { if(confirm("حذف سجل التعبئة؟")) { localStorage.removeItem('fuel_final_v1'); logic(); } }

    setInterval(logic, 1000);
    window.onload = logic;
</script>
</body>
</html>
