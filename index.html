<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2c3e50">
    <meta name="description" content="تطبيق لتنظيم ومتابعة مواعيد تزويد الوقود في كركوك">
    <title>تطبيق الوقود - م. محمد سهران</title>
    
    <link rel="manifest" href="manifest.json?v=2.0">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مواعيد الوقود">
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/vz1f0b0/fuel-app-icon.png">

    <style>
        :root { --primary: #2ecc71; --danger: #e74c3c; --accent: #3498db; --dark: #2c3e50; }
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* لمنع تحديد النصوص ليعطي شعور التطبيق */
        }
        body { background-color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .app-container { background: #fff; width: 100%; max-width: 450px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        
        .header { background: var(--dark); color: white; padding: 12px 5px; text-align: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .header h1 { font-size: 1rem; margin-bottom: 2px; }
        .header .dev-info { font-size: 0.65rem; opacity: 0.8; letter-spacing: 0.5px; }
        .header .current-date { color: var(--accent); font-weight: bold; font-size: 0.8rem; margin-top: 4px; }

        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px 10px; }
        
        .status-ring { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 8px solid #eee; position: relative; transition: 0.3s; }
        .status-ring.active { border-color: var(--primary); box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }
        .status-ring.locked { border-color: #bdc3c7; filter: grayscale(0.5); }
        .fuel-icon { font-size: 3.5rem; }
        
        .day-badge { position: absolute; top: -15px; background: var(--accent); color: white; padding: 4px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .remain-label { font-size: 1.1rem; font-weight: bold; color: var(--dark); }
        .next-call { font-size: 0.8rem; color: #666; background: #f1f3f5; padding: 6px 15px; border-radius: 8px; border: 1px solid #e9ecef; }

        .btn-fuel { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 85%; transition: 0.3s; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3); }
        .btn-fuel:active { transform: scale(0.98); }
        .btn-fuel:disabled { background: #bdc3c7; box-shadow: none; cursor: not-allowed; opacity: 0.7; }
        
        .btn-clear { background: none; border: none; color: var(--danger); font-size: 0.8rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-top: 10px; padding: 5px; }

        .history-panel { background: #fcfcfc; border-top: 1px solid #eee; padding: 10px 15px; height: 120px; flex-shrink: 0; }
        .history-title { font-size: 0.75rem; font-weight: bold; color: var(--dark); border-right: 4px solid var(--accent); padding-right: 10px; margin-bottom: 5px; }
        .log-container { height: 85px; overflow-y: auto; font-size: 0.7rem; }
        .log-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #f1f1f1; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>مواعيد تزويد الوقود - كركوك ⛽</h1>
        <div class="dev-info">فكرة وتصميم: م. محمد سهران خورشيد | 2026 ©</div>
        <div id="date-display" class="current-date"></div>
    </div>

    <div class="main-content">
        <div class="status-ring" id="ring">
            <span class="day-badge" id="day-txt">..</span>
            <span class="fuel-icon">⛽</span>
        </div>
        <div class="remain-label" id="remain-txt">جاري الحساب...</div>
        <div class="next-call" id="next-date">موعد التفعيل القادم: ...</div>
        <button class="btn-fuel" id="fuel-btn" onclick="saveAction()">تم التعبئة ✅</button>
        <button class="btn-clear" onclick="resetLog()"><span>مسح سجل العمليات</span> 🗑️</button>
    </div>

    <div class="history-panel">
        <div class="history-title">سجل التعبئة الأخير:</div>
        <div class="log-container" id="log-list"></div>
    </div>
</div>

<script>
    // تسجيل عامل الخدمة
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error', err));
        });
    }

    const START = new Date(2026, 2, 31); // 31 آذار 2026
    const CYCLE = 5;

    function update() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        
        // عرض التاريخ باللغة العربية
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date-display').innerText = now.toLocaleDateString('ar-IQ', options);

        const diff = Math.floor((today - START) / 86400000);
        const dayInCycle = ((diff % CYCLE) + CYCLE) % CYCLE + 1;
        
        // حساب الأيام المتبقية للدورة القادمة
        let daysWait = (dayInCycle === 1) ? 0 : (CYCLE - dayInCycle + 1);

        document.getElementById('day-txt').innerText = `اليوم ${dayInCycle} من ${CYCLE}`;
        
        const logs = JSON.parse(localStorage.getItem('Fuel_V5_Final') || "[]");
        const currentCycleStart = diff - (dayInCycle - 1);
        const done = logs.some(l => l.cid === currentCycleStart);

        const btn = document.getElementById('fuel-btn');
        const ring = document.getElementById('ring');
        const txt = document.getElementById('remain-txt');

        if (done) {
            ring.className = "status-ring locked";
            btn.disabled = true;
            btn.innerText = "تم تسجيل التعبئة مسبقاً";
            txt.innerText = "عملية مكتملة لهذه الدورة";
            txt.style.color = "#7f8c8d";
        } else if (true) {
            ring.className = "status-ring active";
            btn.disabled = false;
            btn.innerText = "تأكيد التعبئة الآن ✅";
            txt.innerText = "التعبئة متاحة اليوم";
            txt.style.color = "var(--primary)";
        } else {
            ring.className = "status-ring locked";
            btn.disabled = true;
            btn.innerText = "التعبئة غير متاحة";
            txt.innerText = `بانتظار دورك.. باقي ${daysWait} أيام`;
            txt.style.color = "var(--danger)";
        }

        const nxt = new Date(today); 
        nxt.setDate(today.getDate() + daysWait);
        document.getElementById('next-date').innerText = `موعدك القادم: ${nxt.toLocaleDateString('ar-IQ', {day:'numeric', month:'long'})}`;

        render();
    }

    function saveAction() {
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diff = Math.floor((today - START) / 86400000);
        const dayInCycle = ((diff % CYCLE) + CYCLE) % CYCLE + 1;

        let logs = JSON.parse(localStorage.getItem('Fuel_V5_Final') || "[]");
        logs.unshift({
            d: now.toLocaleDateString('ar-IQ'),
            t: now.toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'}),
            cid: diff - (dayInCycle - 1)
        });
        localStorage.setItem('Fuel_V5_Final', JSON.stringify(logs.slice(0, 10)));
        update();
    }

    function render() {
        const logs = JSON.parse(localStorage.getItem('Fuel_V5_Final') || "[]");
        const logHtml = logs.length ? 
            logs.map(l => `<div class="log-row"><span>⛽ عملية تعبئة</span><span>${l.d} | ${l.t}</span></div>`).join('') : 
            '<div style="text-align:center;padding-top:20px;color:#ccc">لا توجد عمليات مسجلة</div>';
        document.getElementById('log-list').innerHTML = logHtml;
    }

    function resetLog() {
        if(confirm("هل أنت متأكد من مسح السجل؟ سيؤدي ذلك لإعادة تفعيل زر التعبئة.")) {
            localStorage.removeItem('Fuel_V5_Final');
            update();
        }
    }

    window.onload = update;
</script>
</body>
</html>
